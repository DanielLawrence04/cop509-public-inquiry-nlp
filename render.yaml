# Render blueprint for the optional FastAPI backend.
# Uses the repo-root Dockerfile so Tesseract OCR is available at runtime —
# Render's plain Python runtime mounts /var/lib/apt read-only, which prevents
# apt-get install of tesseract-ocr.
# Blueprint spec: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cop509-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      # https://cop509-public-inquiry-nlp.vercel.app is already in the backend
      # hardcoded defaults, so this env var is optional — only needed to add
      # extra origins beyond the defaults (comma-separated).
      - key: CORS_ALLOWED_ORIGINS
        sync: false
