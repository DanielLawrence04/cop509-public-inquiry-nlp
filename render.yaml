# Render blueprint for the optional FastAPI backend.
# Deploy with: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cop509-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        sync: false  # set to the Vercel frontend URL, e.g. https://your-app.vercel.app
